<!DOCTYPE html>
<html>
    <head>
        <title>Formulir Registrasi</title>
        <link rel="stylesheet" href="styleRegis.css">
    </head>
    <body>
        <h2 class="judul">Formulir Data Pribadi</h2>
        <form class="form-box" onsubmit="return validasiForm()">
            Nama:<br>
            <input type="text" id="nama" required><br>
            Email:<br>
            <input type="email" id="email" required><br>
            Password:<br>
            <input type="password" id="password" required><br>
            Tanggal Lahir:<br>
            <input type="date"><br>
            Jenis Kelamin:<br>
            <div class="radio-group">
                <label class="radio-item">
                    <input type="radio" name="jk" required>
                    <span>Laki-laki</span>
                </label>
                <label class="radio-item">
                    <input type="radio" name="jk">
                    <span>Perempuan</span>
                </label>
            </div>
            No HP:<br>
            <input type="text"><br>
            Hobi:<br>
            <input type="text"><br>
            <input type="submit" value="Kirim" class="btn">
            <input type="reset" value="Reset" class="btn-reset">
        </form>
        <script>
            function validasiForm() {
                let nama = document.getElementById("nama").value;
                let email = document.getElementById("email").value;
                let password = document.getElementById("password").value;
                if (nama === "" || email === "" || password === "") {
                    alert("Data harus diisi semua!");
                    return false;
                } else {
                    alert("Registrasi berhasil!");
                    window.location.href = "halaman.html";
                    return false;
                }
            }
        </script>
    </body>
</html>
